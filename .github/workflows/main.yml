name: Build SpaceJumper IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install Tools
        run: |
          brew install xcodegen
          gem install xcpretty

      - name: Create Game Project
        run: |
          rm -rf SpaceJumper
          mkdir -p SpaceJumper/Sources/SpaceJumper
          cd SpaceJumper

          cat > project.yml << 'EOF'
          name: SpaceJumper
          options:
            bundleIdPrefix: com.yourname
            deploymentTarget:
              iOS: "17.0"
          targets:
            SpaceJumper:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: Sources
                - path: Info.plist
              settings:
                base:
                  PRODUCT_NAME: SpaceJumper
                  PRODUCT_BUNDLE_IDENTIFIER: com.yourname.spacejumper
                  INFOPLIST_FILE: Info.plist
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  ENABLE_BITCODE: NO
          EOF

          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key><string>com.yourname.spacejumper</string>
            <key>CFBundleName</key><string>SpaceJumper</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSRequiresIPhoneOS</key><true/>
            <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
            <key>UISupportedInterfaceOrientations</key><array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF

          cat > Sources/SpaceJumper/AppDelegate.swift << 'EOF'
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
            var window: UIWindow?
            func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
              window = UIWindow(frame: UIScreen.main.bounds)
              window?.rootViewController = GameViewController()
              window?.makeKeyAndVisible()
              return true
            }
          }
          EOF

          cat > Sources/SpaceJumper/GameViewController.swift << 'EOF'
          import UIKit
          import SpriteKit

          class GameViewController: UIViewController {
            override func viewDidLoad() {
              super.viewDidLoad()
              let scene = GameScene(size: view.bounds.size)
              let skView = view as! SKView
              skView.showsFPS = true
              skView.showsNodeCount = true
              skView.ignoresSiblingOrder = true
              scene.scaleMode = .aspectFill
              skView.presentScene(scene)
            }
            override var prefersStatusBarHidden: Bool { true }
          }
          EOF

          cat > Sources/SpaceJumper/GameScene.swift << 'EOF'
          import SpriteKit

          class GameScene: SKScene, SKPhysicsContactDelegate {
            var player: SKSpriteNode!
            var scoreLabel: SKLabelNode!
            var score = 0
            var isGameOver = false

            override func didMove(to view: SKView) {
              backgroundColor = .black
              physicsWorld.gravity = CGVector(dx: 0, dy: -9.8)
              physicsWorld.contactDelegate = self

              // Stars
              let stars = SKEmitterNode()
              stars.particleTexture = SKTexture(imageNamed: "spark")
              stars.particleBirthRate = 120
              stars.particleLifetime = 6
              stars.particleSpeed = 60
              stars.particleColor = .white
              stars.position = CGPoint(x: size.width/2, y: size.height)
              addChild(stars)

              // Player
              player = SKSpriteNode(color: .systemGreen, size: CGSize(width: 75, height: 75))
              player.position = CGPoint(x: size.width/2, y: 250)
              player.physicsBody = SKPhysicsBody(rectangleOf: player.size)
              player.physicsBody?.isDynamic = true
              addChild(player)

              // Score
              scoreLabel = SKLabelNode(text: "Score: 0")
              scoreLabel.position = CGPoint(x: size.width/2, y: size.height - 80)
              scoreLabel.fontSize = 50
              scoreLabel.fontColor = .white
              addChild(scoreLabel)

              // Ground
              let ground = SKSpriteNode(color: .darkGray, size: CGSize(width: size.width*2, height: 60))
              ground.position = CGPoint(x: size.width/2, y: 90)
              ground.physicsBody = SKPhysicsBody(rectangleOf: ground.size)
              ground.physicsBody?.isDynamic = false
              addChild(ground)

              run(SKAction.repeatForever(SKAction.sequence([
                SKAction.run(spawnObstacle),
                SKAction.wait(forDuration: 1.0)
              ])))

              let tap = UITapGestureRecognizer(target: self, action: #selector(jump))
              view.addGestureRecognizer(tap)
            }

            @objc func jump() {
              if !isGameOver {
                player.physicsBody?.velocity.dy = 0
                player.physicsBody?.applyImpulse(CGVector(dx: 0, dy: 52))
              }
            }

            func spawnObstacle() {
              if isGameOver { return }
              let obs = SKSpriteNode(color: .red, size: CGSize(width: 60, height: 110))
              obs.position = CGPoint(x: CGFloat.random(in: 50...(size.width-50)), y: size.height + 100)
              obs.physicsBody = SKPhysicsBody(rectangleOf: obs.size)
              obs.physicsBody?.isDynamic = false
              addChild(obs)
              obs.run(SKAction.sequence([SKAction.moveTo(y: -100, duration: 3.0), SKAction.removeFromParent()]))
            }

            func didBegin(_ contact: SKPhysicsContact) {
              if !isGameOver {
                isGameOver = true
                let label = SKLabelNode(text: "GAME OVER\nScore: \(score/10)")
                label.position = CGPoint(x: size.width/2, y: size.height/2)
                label.fontSize = 70
                label.fontColor = .red
                label.numberOfLines = 0
                addChild(label)
              }
            }

            override func update(_ currentTime: TimeInterval) {
              if !isGameOver {
                score += 1
                scoreLabel.text = "Score: \(score/10)"
              }
            }
          }
          EOF

          xcodegen generate
          echo "✅ Project Created!"

      - name: Build IPA
        run: |
          cd SpaceJumper
          mkdir -p build

          xcodebuild clean archive \
            -project SpaceJumper.xcodeproj \
            -scheme SpaceJumper \
            -destination 'generic/platform=iOS' \
            -archivePath build/SpaceJumper.xcarchive \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_STYLE=Manual 2>&1 | xcpretty

          cat > build/exportOptions.plist << 'EOP'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          EOP

          xcodebuild -exportArchive \
            -archivePath build/SpaceJumper.xcarchive \
            -exportOptionsPlist build/exportOptions.plist \
            -exportPath build 2>&1 | xcpretty

          ls -la build/
          echo "🎉 IPA Ready!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpaceJumper-iPhone15ProMax
          path: SpaceJumper/build/SpaceJumper.ipa
