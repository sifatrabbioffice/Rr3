name: GameHub Pro - iOS App Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_BUNDLE_ID: "com.gamehub.pro"
  APP_VERSION: "1.0.0"
  XCODE_VERSION: "16.0"   # Update as needed

jobs:
  build_ios_app:
    name: "Build GameHub iOS App"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app
          xcodebuild -version

      - name: Install Build Tools
        run: |
          brew install xcodegen create-dmg

      # ─────────────────────────────────────────────
      # Generate Real Project Structure
      # ─────────────────────────────────────────────
      - name: Generate Project Structure
        run: |
          mkdir -p GameHub/Sources
          mkdir -p GameHub/Resources/Assets.xcassets/AppIcon.appiconset
          
          # Info.plist
          cat > GameHub/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>GameHub</string>
            <key>CFBundleIdentifier</key>
            <string>com.gamehub.pro</string>
            <key>CFBundleName</key>
            <string>GameHub Pro</string>
            <key>CFBundleDisplayName</key>
            <string>GameHub Pro</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIFileSharingEnabled</key>
            <true/>
            <key>LSSupportsOpeningDocumentsInPlace</key>
            <true/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>arm64</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
          </dict>
          </plist>
          EOF

          # project.yml for xcodegen
          cat > project.yml << 'EOF'
          name: GameHub
          options:
            bundleIdPrefix: com.gamehub.pro
            deploymentTarget:
              iOS: "17.0"
          targets:
            GameHub:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: GameHub/Sources
                - path: GameHub/Resources
              info:
                path: GameHub/Info.plist
              settings:
                base:
                  GENERATE_INFOPLIST_FILE: NO
                  SWIFT_OPTIMIZATION_LEVEL: "-O"
                  ENABLE_BITCODE: NO
                  TARGETED_DEVICE_FAMILY: "1,2"
                  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
          EOF

      # ─────────────────────────────────────────────
      # Real SwiftUI Code
      # ─────────────────────────────────────────────
      - name: Write Real App Code
        run: |
          cat > GameHub/Sources/App.swift << 'SWIFT'
          import SwiftUI
          import UniformTypeIdentifiers

          @main
          struct GameHubApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }

          struct ContentView: View {
              @State private var games: [Game] = []
              @State private var showFilePicker = false
              
              var body: some View {
                  NavigationStack {
                      List {
                          ForEach(games) { game in
                              NavigationLink(destination: GameDetailView(game: game)) {
                                  HStack {
                                      Image(systemName: "gamecontroller.fill")
                                          .foregroundColor(.blue)
                                      Text(game.name)
                                  }
                              }
                          }
                      }
                      .navigationTitle("GameHub Pro")
                      .toolbar {
                          Button(action: { showFilePicker = true }) {
                              Label("Import", systemImage: "square.and.arrow.down")
                          }
                      }
                      .overlay {
                          if games.isEmpty {
                              ContentUnavailableView("No Games Yet", 
                                  systemImage: "gamecontroller",
                                  description: Text("Import your PC or mobile games to get started."))
                          }
                      }
                  }
                  .sheet(isPresented: $showFilePicker) {
                      DocumentPicker { url in
                          let newGame = Game(name: url.lastPathComponent, url: url)
                          games.append(newGame)
                      }
                  }
              }
          }

          struct Game: Identifiable {
              let id = UUID()
              let name: String
              let url: URL
          }

          struct GameDetailView: View {
              let game: Game
              
              var body: some View {
                  VStack(spacing: 30) {
                      Image(systemName: "gamecontroller.fill")
                          .font(.system(size: 80))
                          .foregroundColor(.blue)
                      
                      Text(game.name)
                          .font(.largeTitle)
                          .bold()
                      
                      Text("Ready to launch")
                          .foregroundColor(.secondary)
                      
                      Button("Launch Game") {
                          // Future: integrate actual launcher logic here
                          print("Launching: \(game.url)")
                      }
                      .buttonStyle(.borderedProminent)
                      .controlSize(.large)
                  }
                  .padding()
              }
          }

          struct DocumentPicker: UIViewControllerRepresentable {
              var onPick: (URL) -> Void
              
              func makeUIViewController(context: Context) -> UIDocumentPickerViewController {
                  let picker = UIDocumentPickerViewController(forOpeningContentTypes: [.item, .folder, .executable], asCopy: true)
                  picker.allowsMultipleSelection = false
                  picker.delegate = context.coordinator
                  return picker
              }
              
              func updateUIViewController(_ uiViewController: UIDocumentPickerViewController, context: Context) {}
              
              func makeCoordinator() -> Coordinator {
                  Coordinator(self)
              }
              
              class Coordinator: NSObject, UIDocumentPickerDelegate {
                  let parent: DocumentPicker
                  init(_ parent: DocumentPicker) { self.parent = parent }
                  
                  func documentPicker(_ controller: UIDocumentPickerViewController, didPickDocumentsAt urls: [URL]) {
                      guard let url = urls.first else { return }
                      parent.onPick(url)
                  }
              }
          }
          SWIFT

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS="arm64" \
            | xcpretty

      - name: Export IPA
        run: |
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          
          cd build
          zip -qr GameHub_Pro_v${{ env.APP_VERSION }}.ipa Payload/
          
          echo "✅ Build completed successfully!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Pro-IPA
          path: build/GameHub_Pro_v${{ env.APP_VERSION }}.ipa
          retention-days: 14

      - name: Build Summary
        run: |
          echo "══════════════════════════════════════════════"
          echo "✅ GameHub Pro iOS Build Successful"
          echo "Version: ${{ env.APP_VERSION }}"
          echo "IPA Size:"
          ls -lh build/GameHub_Pro_v${{ env.APP_VERSION }}.ipa
          echo "══════════════════════════════════════════════"
