name: GameHub Pro - iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  APP_NAME: "GameHub Pro"
  BUNDLE_ID: "com.gamehub.pro"
  IOS_VERSION: "17.0"
  XCODE_VERSION: "16.0"  # Update as needed

jobs:
  build:
    name: Build GameHub Pro iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app
          xcodebuild -version

      - name: Cache Swift Dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swift-${{ hashFiles('**/*.swift', 'Package.swift', 'project.yml') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Install Build Tools
        run: |
          brew install xcodegen create-dmg

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build iOS App
        run: |
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration ${{ inputs.configuration || 'Release' }} \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            BUILD_NUMBER=${{ github.run_number }}

      - name: Export IPA
        run: |
          mkdir -p build/Payload
          
          # Copy the built .app
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          
          # Package as IPA
          cd build
          zip -qr GameHub_Pro.ipa Payload/
          
          echo "✅ Build completed successfully"
          ls -lh GameHub_Pro.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Pro-IPA
          path: |
            build/GameHub_Pro.ipa
          retention-days: 14

      - name: Print Build Summary
        run: |
          echo "══════════════════════════════════════════════"
          echo "✅ GAMEHUB PRO BUILD SUCCESSFUL"
          echo "══════════════════════════════════════════════"
          echo "Branch:      ${{ github.ref }}"
          echo "Commit:      ${{ github.sha }}"
          echo "IPA Size:    $(ls -lh build/GameHub_Pro.ipa | awk '{print $5}')"
          echo "Target:      iOS ${{ env.IOS_VERSION }}+ (arm64)"
          echo "══════════════════════════════════════════════"
