name: GameHub Pro - A17 PC Engine Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target_game:
        description: 'Target optimization (gta5 / forza / generic)'
        required: false
        default: 'generic'

env:
  WINE_VERSION: "9.0"
  MOLTENVK_VERSION: "1.2.11"
  DXVK_VERSION: "2.4"
  APP_BUNDLE_ID: "com.gamehub.pro.engine"
  APP_VERSION: "3.0"

jobs:
  download_dependencies:
    name: "📦 Download PC Runtimes & Libraries"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Dependency Cache Directory
        run: mkdir -p deps/vcredist deps/directx deps/dotnet deps/dxvk deps/moltenvk deps/wine

      # Visual C++ Redistributables
      - name: Download MSVC++ Redistributables
        run: |
          curl -fsSL "https://aka.ms/vs/17/release/vc_redist.x64.exe" -o deps/vcredist/vc_redist_2022_x64.exe
          curl -fsSL "https://aka.ms/vs/17/release/vc_redist.x86.exe" -o deps/vcredist/vc_redist_2022_x86.exe
          echo "✅ MSVC++ packages downloaded"

      # DirectX & DXVK
      - name: Download DirectX & DXVK
        run: |
          curl -fsSL "https://download.microsoft.com/download/8/4/A/84A35BF1-DAFE-4AE8-82AF-AD2AE20B6B14/directx_Jun2010_redist.exe" \
            -o deps/directx/dx_jun2010_redist.exe
          curl -fsSL "https://github.com/doitsujin/dxvk/releases/download/v${DXVK_VERSION}/dxvk-${DXVK_VERSION}.tar.gz" \
            -o deps/dxvk/dxvk.tar.gz
          tar -xzf deps/dxvk/dxvk.tar.gz -C deps/dxvk/ --strip-components=1

      # .NET
      - name: Download .NET
        run: |
          curl -fsSL "https://download.visualstudio.microsoft.com/download/pr/dotnet-runtime-6.0.36-win-x64.exe" \
            -o deps/dotnet/dotnet6_runtime_x64.exe

      # MoltenVK
      - name: Download MoltenVK
        run: |
          curl -fsSL "https://github.com/KhronosGroup/MoltenVK/releases/download/v${MOLTENVK_VERSION}/MoltenVK-macos.tar" \
            -o deps/moltenvk/MoltenVK.tar
          curl -fsSL "https://github.com/KhronosGroup/MoltenVK/releases/download/v${MOLTENVK_VERSION}/MoltenVK-ios.tar" \
            -o deps/moltenvk/MoltenVK-ios.tar

      - name: Package Dependencies
        run: |
          tar -czf runtime_deps.tar.gz deps/
          ls -lh runtime_deps.tar.gz

      - name: Upload Dependency Bundle
        uses: actions/upload-artifact@v4
        with:
          name: runtime-dependencies
          path: runtime_deps.tar.gz
          retention-days: 7

  build_ios_app:
    name: "🔨 Build GameHub iOS Application"
    runs-on: macos-latest
    needs: download_dependencies
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          brew install xcodegen create-dmg

      - name: Download Runtime Dependencies
        uses: actions/download-artifact@v4
        with:
          name: runtime-dependencies

      - name: Extract Dependencies
        run: |
          tar -xzf runtime_deps.tar.gz

      - name: Generate Project Structure
        run: |
          mkdir -p GameHub/Sources/{Core,GPU,Input,UI}
          mkdir -p GameHub/Resources/Assets.xcassets/{AppIcon.appiconset,AccentColor.colorset}

          # Info.plist
          cat > GameHub/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key><string>com.gamehub.pro.engine</string>
            <key>CFBundleName</key><string>GameHub Pro</string>
            <key>CFBundleDisplayName</key><string>GameHub Pro</string>
            <key>CFBundleShortVersionString</key><string>3.0</string>
            <key>CFBundleVersion</key><string>300</string>
            <key>LSRequiresIPhoneOS</key><true/>
            <key>UIFileSharingEnabled</key><true/>
            <key>LSSupportsOpeningDocumentsInPlace</key><true/>
            <key>UIRequiredDeviceCapabilities</key>
            <array><string>arm64</string><string>metal</string></array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>get-task-allow</key><true/>
          </dict>
          </plist>
          EOF

          # project.yml for XcodeGen
          cat > project.yml << 'EOF'
          name: GameHub
          options:
            bundleIdPrefix: com.gamehub.pro
            deploymentTarget:
              iOS: "17.0"
          targets:
            GameHub:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: GameHub/Sources
                - path: GameHub/Resources
              info:
                path: GameHub/Info.plist
              settings:
                base:
                  GENERATE_INFOPLIST_FILE: NO
                  SWIFT_OPTIMIZATION_LEVEL: "-O"
                  ENABLE_BITCODE: NO
                  TARGETED_DEVICE_FAMILY: "1"
                  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
          EOF

      # Core files (realistic versions)
      - name: Write Core Source Files
        run: |
          # JITEngine.swift - realistic (no false success)
          cat > GameHub/Sources/Core/JITEngine.swift << 'SWIFT'
          import Foundation

          class JITEngine {
              static let shared = JITEngine()
              private(set) var isJITEnabled = false
              
              func enableJIT() -> Bool {
                  // Real JIT on iOS requires get-task-allow + sideload tool (SideStore/StikDebug/etc.)
                  // This is just a probe - actual success depends on external tooling
                  let pageSize = 16 * 1024
                  guard let mem = mmap(nil, pageSize, PROT_READ | PROT_WRITE | PROT_EXEC, 
                                       MAP_PRIVATE | MAP_ANONYMOUS, -1, 0),
                        mem != MAP_FAILED else {
                      print("JIT probe failed - requires external JIT enabler")
                      return false
                  }
                  munmap(mem, pageSize)
                  isJITEnabled = true
                  return true
              }
          }
          SWIFT

          # Metal Bridge
          cat > GameHub/Sources/GPU/MetalBridge.swift << 'SWIFT'
          import Metal

          class MetalBridge {
              static let shared = MetalBridge()
              let device: MTLDevice? = MTLCreateSystemDefaultDevice()
              
              private init() {}
          }
          SWIFT

          # Controller Input (clean)
          cat > GameHub/Sources/Input/ControllerInput.swift << 'SWIFT'
          import GameController
          import CoreHaptics

          class ControllerInput: ObservableObject {
              static let shared = ControllerInput()
              @Published var leftStick: CGPoint = .zero
              @Published var rightStick: CGPoint = .zero
              
              private var hapticEngine: CHHapticEngine?
              
              private init() {
                  if CHHapticEngine.capabilitiesForHardware().supportsHaptics {
                      hapticEngine = try? CHHapticEngine()
                      try? hapticEngine?.start()
                  }
              }
              
              func triggerHaptic(intensity: Float = 0.7) {
                  guard let engine = hapticEngine else { return }
                  let event = CHHapticEvent(eventType: .hapticTransient, 
                                           parameters: [CHHapticEventParameter(parameterID: .hapticIntensity, value: intensity)],
                                           relativeTime: 0)
                  if let pattern = try? CHHapticPattern(events: [event], parameters: []),
                     let player = try? engine.makePlayer(with: pattern) {
                      try? player.start(atTime: 0)
                  }
              }
          }
          SWIFT

          # Main App UI (kept mostly intact but realistic)
          cat > GameHub/Sources/UI/App.swift << 'SWIFT'
          import SwiftUI
          import UniformTypeIdentifiers

          @main
          struct GameHubApp: App {
              var body: some Scene {
                  WindowGroup { RootView() }
              }
          }

          struct RootView: View {
              @State private var scene: AppScene = .boot
              @State private var selectedGame: URL?
              
              enum AppScene { case boot, desktop, gaming }
              
              var body: some View {
                  ZStack {
                      Color.black.ignoresSafeArea()
                      switch scene {
                      case .boot: BootSequenceView(onComplete: { scene = .desktop })
                      case .desktop: DesktopView(onGameStart: { url in
                          selectedGame = url
                          scene = .gaming
                      })
                      case .gaming: GamingView(gameURL: selectedGame, onExit: { scene = .desktop })
                      }
                  }
                  .preferredColorScheme(.dark)
                  .statusBarHidden(true)
              }
          }

          // BootSequenceView, DesktopView, GamingView, etc. 
          // (You can keep the nice UI you had - it's good. Just remove fake logs claiming "JIT ENABLED" etc.)
          // For brevity I omitted full UI here - copy your original nice UI code and tone down claims.
          SWIFT

      - name: Generate Xcode Project & Build
        run: |
          xcodegen generate
          
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS="arm64" | xcpretty || true

      - name: Assemble IPA with Runtimes
        run: |
          mkdir -p build/Payload/GameHub.app
          cp -r build/GameHub.xcarchive/Products/Applications/GameHub.app/* build/Payload/GameHub.app/ 2>/dev/null || true
          
          BUNDLE_DIR="build/Payload/GameHub.app"
          
          mkdir -p "$BUNDLE_DIR/Runtime/"{vcredist,directx,dotnet,dxvk,wine_prefix,moltenvk,proton}
          
          # Copy real downloaded files
          cp -r deps/* "$BUNDLE_DIR/Runtime/" 2>/dev/null || true
          
          # Proton-style environment skeleton
          cat > "$BUNDLE_DIR/Runtime/proton/config.env" << EOF
          WINEPREFIX=/var/mobile/Containers/Data/Application/\$(uuidgen)/Documents/WinePrefix
          DXVK_CONFIG="d3d9,d3d10,d3d11"
          VKD3D_CONFIG="dx12"
          WINEDEBUG=-all
          EOF

          cat > "$BUNDLE_DIR/Runtime/proton/launch.sh" << 'SCRIPT'
          #!/bin/sh
          echo "GameHub Proton-like launcher"
          echo "Game path: $1"
          # In real implementation this would call Box64 + FEX + Wine
          echo "Would launch: wine $1"
          SCRIPT
          chmod +x "$BUNDLE_DIR/Runtime/proton/launch.sh"

          # Create manifest
          cat > "$BUNDLE_DIR/Runtime/manifest.json" << MANIFEST
          {
            "version": "3.0",
            "engine": "GameHub Pro",
            "components": {
              "translator": "Box64 + FEX-Emu (planned)",
              "compatibility": "Wine 9.0 + DXVK",
              "graphics": "DXVK → MoltenVK → Metal",
              "note": "Full Windows execution requires external JIT + native Wine/Box64 port"
            }
          }
          MANIFEST

          cd build
          zip -qr GameHub_Pro_v3.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Pro-IPA
          path: |
            build/GameHub_Pro_v3.ipa
          retention-days: 14
