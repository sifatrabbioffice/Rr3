name: iOS Game Build - iPhone 15 Pro Max

on:
  workflow_dispatch:  # Manual run koro
  push:
    branches: [ main ]

jobs:
  build-game:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app  # Latest Xcode

      - name: Create Full iOS Game Project
        run: |
          echo "🚀 Creating SpriteKit Game Project..."
          mkdir -p SpaceJumper/SpaceJumper
          cd SpaceJumper

          # Create project files
          cat > SpaceJumper.xcodeproj/project.pbxproj << 'EOF'
          // Simple Xcode project file (minimal for single target)
          {
            archiveVersion = 1;
            classes = {};
            objectVersion = 60;
            objects = {
              /* Root object */
              13A4B5C12A1D000000000000 /* Project object */ = {
                isa = PBXProject;
                attributes = { LastUpgradeCheck = 1600; };
                buildConfigurationList = 13A4B5C22A1D000000000000 /* Build configuration list for PBXProject */;
                compatibilityVersion = "Xcode 15.0";
                developmentRegion = en;
                hasScannedForEncodings = 0;
                knownRegions = (en, Base);
                mainGroup = 13A4B5C32A1D000000000000;
                productRefGroup = 13A4B5C32A1D000000000000;
                projectDirPath = "";
                projectRoot = "";
                targets = (13A4B5C42A1D000000000000 /* SpaceJumper */);
              };
              /* Add more objects as needed - simplified for CI */
            };
          }
          EOF

          # AppDelegate.swift
          cat > SpaceJumper/AppDelegate.swift << 'EOF'
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
            var window: UIWindow?
            func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
              window = UIWindow(frame: UIScreen.main.bounds)
              window?.rootViewController = GameViewController()
              window?.makeKeyAndVisible()
              return true
            }
          }
          EOF

          # GameViewController.swift
          cat > SpaceJumper/GameViewController.swift << 'EOF'
          import UIKit
          import SpriteKit

          class GameViewController: UIViewController {
            override func viewDidLoad() {
              super.viewDidLoad()
              let scene = GameScene(size: view.bounds.size)
              let skView = view as! SKView
              skView.showsFPS = true
              skView.showsNodeCount = true
              skView.ignoresSiblingOrder = true
              scene.scaleMode = .aspectFill
              skView.presentScene(scene)
            }
            override var prefersStatusBarHidden: Bool { true }
          }
          EOF

          # Main Game: GameScene.swift (Full Game Logic)
          cat > SpaceJumper/GameScene.swift << 'EOF'
          import SpriteKit

          class GameScene: SKScene, SKPhysicsContactDelegate {
            var player: SKSpriteNode!
            var scoreLabel: SKLabelNode!
            var score = 0
            let playerCategory: UInt32 = 0x1 << 0
            let obstacleCategory: UInt32 = 0x1 << 1

            override func didMove(to view: SKView) {
              backgroundColor = .black
              physicsWorld.gravity = CGVector(dx: 0, dy: -9.8)
              physicsWorld.contactDelegate = self

              // Background stars
              let stars = SKEmitterNode(fileNamed: "Stars") ?? SKEmitterNode()
              stars.position = CGPoint(x: size.width/2, y: size.height)
              addChild(stars)

              // Player (Alien Character)
              player = SKSpriteNode(color: .green, size: CGSize(width: 60, height: 60))
              player.position = CGPoint(x: size.width/2, y: 200)
              player.physicsBody = SKPhysicsBody(rectangleOf: player.size)
              player.physicsBody?.isDynamic = true
              player.physicsBody?.categoryBitMask = playerCategory
              player.physicsBody?.collisionBitMask = 0
              player.physicsBody?.contactTestBitMask = obstacleCategory
              addChild(player)

              // Score
              scoreLabel = SKLabelNode(text: "Score: 0")
              scoreLabel.position = CGPoint(x: size.width/2, y: size.height - 100)
              scoreLabel.fontSize = 40
              scoreLabel.fontColor = .white
              addChild(scoreLabel)

              // Ground
              let ground = SKSpriteNode(color: .gray, size: CGSize(width: size.width, height: 20))
              ground.position = CGPoint(x: size.width/2, y: 50)
              ground.physicsBody = SKPhysicsBody(rectangleOf: ground.size)
              ground.physicsBody?.isDynamic = false
              addChild(ground)

              // Spawn obstacles
              run(SKAction.repeatForever(SKAction.sequence([
                SKAction.run(spawnObstacle),
                SKAction.wait(forDuration: 1.2)
              ])))

              // Tap to jump
              let tap = UITapGestureRecognizer(target: self, action: #selector(jump))
              view.addGestureRecognizer(tap)
            }

            @objc func jump() {
              player.physicsBody?.velocity = CGVector(dx: 0, dy: 0)
              player.physicsBody?.applyImpulse(CGVector(dx: 0, dy: 45))
            }

            func spawnObstacle() {
              let obstacle = SKSpriteNode(color: .red, size: CGSize(width: 50, height: 80))
              let xPos = CGFloat.random(in: 50...(size.width-50))
              obstacle.position = CGPoint(x: xPos, y: size.height + 50)
              obstacle.physicsBody = SKPhysicsBody(rectangleOf: obstacle.size)
              obstacle.physicsBody?.isDynamic = false
              obstacle.physicsBody?.categoryBitMask = obstacleCategory
              addChild(obstacle)

              let move = SKAction.moveTo(y: -50, duration: 3.0)
              let remove = SKAction.removeFromParent()
              obstacle.run(SKAction.sequence([move, remove]))
            }

            func didBegin(_ contact: SKPhysicsContact) {
              if (contact.bodyA.categoryBitMask == playerCategory && contact.bodyB.categoryBitMask == obstacleCategory) ||
                 (contact.bodyB.categoryBitMask == playerCategory && contact.bodyA.categoryBitMask == obstacleCategory) {
                gameOver()
              }
            }

            func gameOver() {
              let label = SKLabelNode(text: "Game Over! Score: \(score)")
              label.position = CGPoint(x: size.width/2, y: size.height/2)
              label.fontSize = 60
              label.fontColor = .red
              addChild(label)
              // Music stop etc.
            }

            override func update(_ currentTime: TimeInterval) {
              score += 1
              scoreLabel.text = "Score: \(score/10)"
            }
          }
          EOF

          # Info.plist
          cat > SpaceJumper/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key><string>com.yourname.spacejumper</string>
            <key>CFBundleName</key><string>SpaceJumper</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
            <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array>
          </dict>
          </plist>
          EOF

          echo "✅ Project created with custom character, space environment, scoring, physics!"

      - name: Build & Archive IPA
        run: |
          cd SpaceJumper
          xcodebuild clean archive \
            -project SpaceJumper.xcodeproj \
            -scheme SpaceJumper \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/SpaceJumper.xcarchive \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

          xcodebuild -exportArchive \
            -archivePath ./build/SpaceJumper.xcarchive \
            -exportOptionsPlist <(cat <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>teamID</key><string></string>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          EOF
          ) \
            -exportPath ./build

          echo "🎉 IPA Generated!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpaceJumper-IPA
          path: SpaceJumper/build/SpaceJumper.ipa
