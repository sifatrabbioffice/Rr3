name: iOS Game Build - SpaceJumper

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-game:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Complete SpriteKit Game
        run: |
          echo "🚀 Creating full Xcode project with XcodeGen..."

          rm -rf SpaceJumper
          mkdir -p SpaceJumper

          cd SpaceJumper

          # Project spec for XcodeGen
          cat > project.yml << 'EOF'
          name: SpaceJumper
          options:
            bundleIdPrefix: com.yourname
            deploymentTarget:
              iOS: "17.0"
          targets:
            SpaceJumper:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: Sources
              settings:
                base:
                  CODE_SIGN_STYLE: Manual
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  PRODUCT_BUNDLE_IDENTIFIER: com.yourname.spacejumper
          EOF

          # Create source folder
          mkdir -p Sources/SpaceJumper

          # AppDelegate.swift
          cat > Sources/SpaceJumper/AppDelegate.swift << 'EOF'
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
            var window: UIWindow?
            func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
              window = UIWindow(frame: UIScreen.main.bounds)
              window?.rootViewController = GameViewController()
              window?.makeKeyAndVisible()
              return true
            }
          }
          EOF

          # GameViewController.swift
          cat > Sources/SpaceJumper/GameViewController.swift << 'EOF'
          import UIKit
          import SpriteKit

          class GameViewController: UIViewController {
            override func viewDidLoad() {
              super.viewDidLoad()
              let scene = GameScene(size: view.bounds.size)
              let skView = view as! SKView
              skView.showsFPS = true
              skView.showsNodeCount = true
              skView.ignoresSiblingOrder = true
              scene.scaleMode = .aspectFill
              skView.presentScene(scene)
            }
            override var prefersStatusBarHidden: Bool { true }
          }
          EOF

          # Main Game (Improved)
          cat > Sources/SpaceJumper/GameScene.swift << 'EOF'
          import SpriteKit

          class GameScene: SKScene, SKPhysicsContactDelegate {
            var player: SKSpriteNode!
            var scoreLabel: SKLabelNode!
            var score = 0
            var isGameOver = false

            let playerCategory: UInt32 = 0x1 << 0
            let obstacleCategory: UInt32 = 0x1 << 1

            override func didMove(to view: SKView) {
              backgroundColor = .black
              physicsWorld.gravity = CGVector(dx: 0, dy: -9.8)
              physicsWorld.contactDelegate = self

              // Background stars
              let stars = SKEmitterNode()
              stars.particleTexture = SKTexture(imageNamed: "spark")
              stars.particleBirthRate = 100
              stars.particleLifetime = 6
              stars.particleSpeed = 40
              stars.particleColor = .white
              stars.position = CGPoint(x: size.width/2, y: size.height + 50)
              addChild(stars)

              // Player - Alien
              player = SKSpriteNode(color: .systemGreen, size: CGSize(width: 70, height: 70))
              player.position = CGPoint(x: size.width/2, y: 250)
              player.physicsBody = SKPhysicsBody(rectangleOf: player.size)
              player.physicsBody?.isDynamic = true
              player.physicsBody?.categoryBitMask = playerCategory
              player.physicsBody?.contactTestBitMask = obstacleCategory
              player.physicsBody?.collisionBitMask = 0
              addChild(player)

              // Score
              scoreLabel = SKLabelNode(text: "Score: 0")
              scoreLabel.position = CGPoint(x: size.width/2, y: size.height - 80)
              scoreLabel.fontSize = 50
              scoreLabel.fontColor = .white
              addChild(scoreLabel)

              // Ground
              let ground = SKSpriteNode(color: .darkGray, size: CGSize(width: size.width*2, height: 50))
              ground.position = CGPoint(x: size.width/2, y: 80)
              ground.physicsBody = SKPhysicsBody(rectangleOf: ground.size)
              ground.physicsBody?.isDynamic = false
              addChild(ground)

              run(SKAction.repeatForever(SKAction.sequence([
                SKAction.run(spawnObstacle),
                SKAction.wait(forDuration: 1.0)
              ])))

              let tap = UITapGestureRecognizer(target: self, action: #selector(jump))
              view.addGestureRecognizer(tap)
            }

            @objc func jump() {
              if !isGameOver {
                player.physicsBody?.velocity.dy = 0
                player.physicsBody?.applyImpulse(CGVector(dx: 0, dy: 50))
              }
            }

            func spawnObstacle() {
              if isGameOver { return }
              let obstacle = SKSpriteNode(color: .red, size: CGSize(width: 55, height: 100))
              let x = CGFloat.random(in: 50...(size.width-50))
              obstacle.position = CGPoint(x: x, y: size.height + 50)
              obstacle.physicsBody = SKPhysicsBody(rectangleOf: obstacle.size)
              obstacle.physicsBody?.isDynamic = false
              obstacle.physicsBody?.categoryBitMask = obstacleCategory
              addChild(obstacle)

              obstacle.run(SKAction.sequence([
                SKAction.moveTo(y: -50, duration: 3.0),
                SKAction.removeFromParent()
              ]))
            }

            func didBegin(_ contact: SKPhysicsContact) {
              if !isGameOver {
                isGameOver = true
                gameOver()
              }
            }

            func gameOver() {
              let label = SKLabelNode(text: "GAME OVER\nScore: \(score/10)")
              label.position = CGPoint(x: size.width/2, y: size.height/2)
              label.fontSize = 70
              label.fontColor = .red
              label.numberOfLines = 0
              addChild(label)
            }

            override func update(_ currentTime: TimeInterval) {
              if !isGameOver {
                score += 1
                scoreLabel.text = "Score: \(score/10)"
              }
            }
          }
          EOF

          echo "✅ Project spec created. Generating Xcode project..."

          xcodegen generate

          echo "✅ Xcode project successfully generated!"

      - name: Build & Export IPA
        run: |
          cd SpaceJumper
          
          xcodebuild clean archive \
            -project SpaceJumper.xcodeproj \
            -scheme SpaceJumper \
            -destination 'generic/platform=iOS' \
            -archivePath build/SpaceJumper.xcarchive \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_STYLE=Manual | xcpretty

          xcodebuild -exportArchive \
            -archivePath build/SpaceJumper.xcarchive \
            -exportOptionsPlist <(cat <<'EOP'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          EOP
          ) \
            -exportPath build | xcpretty

          echo "🎉 IPA Successfully Created!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpaceJumper-IPA
          path: SpaceJumper/build/SpaceJumper.ipa
