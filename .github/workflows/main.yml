name: iOS Game Build - SpaceJumper

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-game:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Create Full SpriteKit Game Project
        run: |
          echo "🚀 Creating SpriteKit Game Project..."

          # Main project folder
          rm -rf SpaceJumper
          mkdir -p SpaceJumper/SpaceJumper

          cd SpaceJumper

          # Create Xcode project structure
          mkdir -p SpaceJumper.xcodeproj

          cat > SpaceJumper.xcodeproj/project.pbxproj << 'EOF'
          {
            "archiveVersion": "1",
            "classes": {},
            "objectVersion": "60",
            "objects": {
              "13A4B5C12A1D000000000000": {
                "isa": "PBXProject",
                "attributes": { "LastUpgradeCheck": "1600" },
                "buildConfigurationList": "13A4B5C22A1D000000000000",
                "compatibilityVersion": "Xcode 15.0",
                "developmentRegion": "en",
                "hasScannedForEncodings": 0,
                "knownRegions": ["en", "Base"],
                "mainGroup": "13A4B5C32A1D000000000000",
                "productRefGroup": "13A4B5C32A1D000000000000",
                "projectDirPath": "",
                "projectRoot": "",
                "targets": ["13A4B5C42A1D000000000000"]
              }
            }
          }
          EOF

          # AppDelegate.swift
          cat > SpaceJumper/AppDelegate.swift << 'EOF'
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
            var window: UIWindow?
            func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
              window = UIWindow(frame: UIScreen.main.bounds)
              window?.rootViewController = GameViewController()
              window?.makeKeyAndVisible()
              return true
            }
          }
          EOF

          # GameViewController.swift
          cat > SpaceJumper/GameViewController.swift << 'EOF'
          import UIKit
          import SpriteKit

          class GameViewController: UIViewController {
            override func viewDidLoad() {
              super.viewDidLoad()
              let scene = GameScene(size: view.bounds.size)
              let skView = view as! SKView
              skView.showsFPS = true
              skView.showsNodeCount = true
              skView.ignoresSiblingOrder = true
              scene.scaleMode = .aspectFill
              skView.presentScene(scene)
            }
            override var prefersStatusBarHidden: Bool { true }
          }
          EOF

          # Main Game Scene (Endless Jumper)
          cat > SpaceJumper/GameScene.swift << 'EOF'
          import SpriteKit
          import AVFoundation

          class GameScene: SKScene, SKPhysicsContactDelegate {
            var player: SKSpriteNode!
            var scoreLabel: SKLabelNode!
            var score = 0
            var backgroundMusic: AVAudioPlayer?

            let playerCategory: UInt32 = 0x1 << 0
            let obstacleCategory: UInt32 = 0x1 << 1

            override func didMove(to view: SKView) {
              backgroundColor = .black
              physicsWorld.gravity = CGVector(dx: 0, dy: -9.8)
              physicsWorld.contactDelegate = self

              // Stars background
              let stars = SKEmitterNode()
              stars.particleTexture = SKTexture(imageNamed: "spark")
              stars.particleBirthRate = 80
              stars.particleLifetime = 5
              stars.particleSpeed = 50
              stars.position = CGPoint(x: size.width/2, y: size.height)
              stars.particleColor = .white
              addChild(stars)

              // Player (Green Alien)
              player = SKSpriteNode(color: .systemGreen, size: CGSize(width: 65, height: 65))
              player.position = CGPoint(x: size.width/2, y: 250)
              player.physicsBody = SKPhysicsBody(rectangleOf: player.size)
              player.physicsBody?.isDynamic = true
              player.physicsBody?.categoryBitMask = playerCategory
              player.physicsBody?.contactTestBitMask = obstacleCategory
              player.physicsBody?.collisionBitMask = 0
              addChild(player)

              // Score
              scoreLabel = SKLabelNode(text: "Score: 0")
              scoreLabel.position = CGPoint(x: size.width/2, y: size.height - 80)
              scoreLabel.fontSize = 48
              scoreLabel.fontColor = .white
              addChild(scoreLabel)

              // Ground
              let ground = SKSpriteNode(color: .darkGray, size: CGSize(width: size.width*2, height: 40))
              ground.position = CGPoint(x: size.width/2, y: 80)
              ground.physicsBody = SKPhysicsBody(rectangleOf: ground.size)
              ground.physicsBody?.isDynamic = false
              addChild(ground)

              // Spawn obstacles
              run(SKAction.repeatForever(SKAction.sequence([
                SKAction.run(spawnObstacle),
                SKAction.wait(forDuration: 1.1)
              ])))

              let tap = UITapGestureRecognizer(target: self, action: #selector(jump))
              view.addGestureRecognizer(tap)
            }

            @objc func jump() {
              player.physicsBody?.velocity.dy = 0
              player.physicsBody?.applyImpulse(CGVector(dx: 0, dy: 48))
            }

            func spawnObstacle() {
              let width = CGFloat.random(in: 40...70)
              let obstacle = SKSpriteNode(color: .red, size: CGSize(width: width, height: 90))
              let xPos = CGFloat.random(in: 60...(size.width - 60))
              obstacle.position = CGPoint(x: xPos, y: size.height + 100)
              obstacle.physicsBody = SKPhysicsBody(rectangleOf: obstacle.size)
              obstacle.physicsBody?.isDynamic = false
              obstacle.physicsBody?.categoryBitMask = obstacleCategory
              addChild(obstacle)

              let move = SKAction.moveTo(y: -100, duration: 3.2)
              obstacle.run(SKAction.sequence([move, SKAction.removeFromParent()]))
            }

            func didBegin(_ contact: SKPhysicsContact) {
              gameOver()
            }

            func gameOver() {
              let gameOverLabel = SKLabelNode(text: "Game Over!\nScore: \(score/8)")
              gameOverLabel.position = CGPoint(x: size.width/2, y: size.height/2)
              gameOverLabel.fontSize = 65
              gameOverLabel.fontColor = .red
              gameOverLabel.numberOfLines = 2
              addChild(gameOverLabel)
              isPaused = true
            }

            override func update(_ currentTime: TimeInterval) {
              if !isPaused {
                score += 1
                scoreLabel.text = "Score: \(score/8)"
              }
            }
          }
          EOF

          # Info.plist
          cat > SpaceJumper/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key><string>com.yourname.spacejumper</string>
            <key>CFBundleName</key><string>SpaceJumper</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
            <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array>
          </dict>
          </plist>
          EOF

          echo "✅ Project successfully created!"

      - name: Build & Export IPA
        run: |
          cd SpaceJumper
          xcodebuild clean archive \
            -project SpaceJumper.xcodeproj \
            -scheme SpaceJumper \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/SpaceJumper.xcarchive \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO | xcpretty

          xcodebuild -exportArchive \
            -archivePath ./build/SpaceJumper.xcarchive \
            -exportOptionsPlist <(cat <<'EOP'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>automatic</string>
          </dict>
          </plist>
          EOP
          ) \
            -exportPath ./build 2>&1 | xcpretty

          echo "🎉 IPA Build Complete!"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceJumper-IPA
          path: SpaceJumper/build/SpaceJumper.ipa
